<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELFIGO | INNOVA EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@300;600;800&display=swap');

        /* FIX BACKGROUND & SCROLL */
        html { background-color: #050505; scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: url('innova.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #050505;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            position: relative;
            overflow-x: hidden;
            touch-action: pan-y; /* Supaya bisa scroll tapi tetep bisa tracking jari */
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); z-index: 0;
        }

        .sakura-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: #ffb7c5; border-radius: 100% 0 100% 0; opacity: 0.5; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        /* KARTU UTAMA */
        .card {
            position: relative; width: 100%; max-width: 900px;
            background: rgba(15, 15, 20, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 20px;
            display: flex; flex-direction: row;
            padding: 30px; gap: 30px; z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .img-box {
            flex: 1.2; border-radius: 15px; overflow: hidden;
            border: 2px solid #00f0ff; min-height: 400px;
            pointer-events: none;
        }
        
        .img-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; object-position: center 61%; 
            display: block; 
        }

        .content { flex: 1; display: flex; flex-direction: column; justify-content: center; color: white; pointer-events: none; }
        .tag { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #00f0ff; letter-spacing: 5px; margin-bottom: 12px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; line-height: 1; margin-bottom: 10px; text-shadow: 0 0 20px #00f0ff; }
        .location { font-size: 13px; letter-spacing: 2px; opacity: 0.8; margin-bottom: 20px; border-left: 3px solid #ffb7c5; padding-left: 15px; }
        
        .cdid-info { background: rgba(0, 240, 255, 0.05); border: 1px solid rgba(0, 240, 255, 0.15); padding: 18px; border-radius: 12px; margin-bottom: 25px; }
        .cdid-info p { font-size: 13px; line-height: 1.6; color: #ccc; }
        .cdid-info b { color: #00f0ff; font-family: 'Orbitron', sans-serif; font-size: 10px; display: block; margin-bottom: 6px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .btn {
            padding: 16px; border-radius: 10px; text-decoration: none; color: white;
            font-weight: 800; font-family: 'Orbitron', sans-serif; font-size: 11px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; transition: 0.4s;
        }

        @media (max-width: 850px) {
            body { padding: 40px 15px; }
            .card { flex-direction: column; padding: 20px; gap: 20px; }
            .img-box { min-height: 250px; flex: none; }
            h1 { font-size: 2.5rem; text-align: center; }
            .tag { text-align: center; }
            .location { border-left: none; border-bottom: 2px solid #ffb7c5; padding-bottom: 10px; display: block; width: fit-content; margin: 0 auto 20px auto; }
            .content { text-align: center; }
        }
    </style>
</head>
<body>

<div class="sakura-box" id="sakura"></div>

<div class="card" id="mainCard">
    <div class="img-box"><img src="innova.png"></div>
    <div class="content">
        <p class="tag">CDID ELITE // ID 083</p>
        <h1>ELFIGO</h1>
        <p class="location">PONTIANAK, WEST BORNEO</p>
        <div class="cdid-info">
            <b>COMMUNITY STATUS</b>
            <p>Active member of CDID Pontianak Region. Focus on 2GD-FTV Diesel performance and fitment. Part of the Elite Driver circle ID: 083.</p>
        </div>
        <div class="btn-group">
            <a href="https://wa.me/6283857796343" class="btn" target="_blank">CONTACT WHATSAPP <span>→</span></a>
            <a href="https://discord.gg/cemxjsmRH" class="btn" target="_blank">JOIN DISCORD <span>→</span></a>
        </div>
    </div>
</div>

<script>
    // Sakura
    const sakura = document.getElementById('sakura');
    for(let i=0; i<30; i++) {
        let p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random()*100+'%';
        p.style.width = p.style.height = (Math.random()*7+5)+'px';
        p.style.animationDuration = (Math.random()*6+4)+'s';
        sakura.appendChild(p);
    }

    const card = document.getElementById('mainCard');

    // Fungsi Gerak
    function applyTilt(x, y) {
        const rx = (window.innerHeight / 2 - y) / 30;
        const ry = (window.innerWidth / 2 - x) / 30;
        card.style.transform = `rotateX(${rx}deg) rotateY(${-ry}deg)`;
    }

    // Gerak Mouse (Laptop)
    window.addEventListener('mousemove', (e) => {
        applyTilt(e.clientX, e.clientY);
    });

    // Gerak Jari (HP)
    window.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        applyTilt(touch.clientX, touch.clientY);
    }, { passive: true });

    // Balik Normal pas Jari Lepas
    window.addEventListener('touchend', () => {
        card.style.transition = "transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)";
        card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        setTimeout(() => { card.style.transition = "transform 0.1s ease-out"; }, 600);
    });
</script>
</body>
</html>
