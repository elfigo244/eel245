!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELFIGO | INNOVA EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@300;600;800&display=swap');

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Cursor neon hanya muncul di layar besar */
        @media (min-width: 851px) {
            * { cursor: none; }
        }

        body {
            background: url('innova.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #050505;
            font-family: 'Outfit', sans-serif;
            /* PAKAI MIN-HEIGHT BIAR BISA SCROLL */
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px);
            z-index: 0;
        }

        .sakura-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: #ffb7c5; border-radius: 100% 0 100% 0; opacity: 0.5; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        /* CARD CONFIG */
        .card {
            position: relative; width: 100%; max-width: 950px;
            background: rgba(15, 15, 20, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 25px;
            display: flex; 
            flex-direction: row; /* Default Laptop */
            padding: 30px; gap: 30px;
            z-index: 10; box-shadow: 0 0 50px rgba(0,0,0,0.9);
            height: auto;
        }

        .img-box {
            flex: 1.2; border-radius: 15px; overflow: hidden;
            border: 2px solid #00f0ff; min-height: 380px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        
        .img-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: center 61%; /* SESUAI REQUEST 61% */
            display: block; 
        }

        .content { flex: 1; display: flex; flex-direction: column; justify-content: center; color: white; }
        .tag { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #00f0ff; letter-spacing: 5px; margin-bottom: 12px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1; margin-bottom: 10px; text-shadow: 0 0 20px #00f0ff; }
        .location { font-size: 13px; letter-spacing: 2px; opacity: 0.8; margin-bottom: 20px; border-left: 3px solid #ffb7c5; padding-left: 15px; }
        
        .cdid-info { background: rgba(0, 240, 255, 0.05); border: 1px solid rgba(0, 240, 255, 0.1); padding: 18px; border-radius: 12px; margin-bottom: 25px; }
        .cdid-info p { font-size: 13px; line-height: 1.6; color: #ccc; }
        .cdid-info b { color: #00f0ff; font-family: 'Orbitron', sans-serif; font-size: 10px; display: block; margin-bottom: 6px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            padding: 16px; border-radius: 10px; text-decoration: none;
            color: white; font-weight: 800; font-family: 'Orbitron', sans-serif; font-size: 11px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center; transition: 0.4s;
        }
        .btn:hover { background: rgba(0, 240, 255, 0.15); border-color: #00f0ff; transform: translateX(8px); }

        /* RESPONSIVE UNTUK HP & TABLET */
        @media (max-width: 850px) {
            body { padding: 20px 15px; }
            .card { flex-direction: column; padding: 20px; gap: 20px; width: 95%; margin: auto; }
            .img-box { min-height: 280px; flex: none; }
            h1 { text-align: center; font-size: 2.2rem; }
            .tag { text-align: center; }
            .location { border-left: none; border-bottom: 2px solid #ffb7c5; padding: 0 0 10px 0; display: block; width: fit-content; margin: 0 auto 20px auto; }
            .content { text-align: left; }
            .btn:hover { transform: none; } /* Matikan animasi geser di HP biar stabil */
        }

        #trail { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

<canvas id="trail"></canvas>
<div class="sakura-box" id="sakura"></div>

<div class="card" id="mainCard">
    <div class="img-box">
        <img src="innova.png" alt="Innova Elfigo">
    </div>
    <div class="content">
        <p class="tag">CDID ELITE // ID 083</p>
        <h1>ELFIGO</h1>
        <p class="location">PONTIANAK, WEST BORNEO</p>
        
        <div class="cdid-info">
            <b>COMMUNITY STATUS</b>
            <p>Active member of CDID Pontianak Region. Focus on 2GD-FTV Diesel performance and fitment. Part of the Elite Driver circle ID: 083.</p>
        </div>

        <div class="btn-group">
            <a href="https://wa.me/6283857796343" class="btn" target="_blank">CONTACT WHATSAPP <span>→</span></a>
            <a href="https://discord.gg/cemxjsmRH" class="btn" target="_blank">JOIN DISCORD <span>→</span></a>
        </div>
    </div>
</div>

<script>
    // Sakura Effect
    const sakura = document.getElementById('sakura');
    for(let i=0; i<30; i++) {
        let p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random()*100+'%';
        p.style.width = p.style.height = (Math.random()*7+5)+'px';
        p.style.animationDuration = (Math.random()*6+4)+'s';
        p.style.animationDelay = Math.random()*5+'s';
        sakura.appendChild(p);
    }

    // Cursor Trail & 3D Effect (Only Laptop)
    const canvas = document.getElementById('trail');
    const ctx = canvas.getContext('2d');
    let pts = [];
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();

    window.addEventListener('mousemove', (e) => {
        if (window.innerWidth > 850) {
            pts.push({x: e.clientX, y: e.clientY, l: 1});
            const card = document.getElementById('mainCard');
            const rx = (window.innerHeight / 2 - e.clientY) / 70;
            const ry = (window.innerWidth / 2 - e.clientX) / 70;
            card.style.transform = `rotateX(${rx}deg) rotateY(${-ry}deg)`;
        }
    });

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        if (window.innerWidth > 850) {
            ctx.strokeStyle = '#00f0ff'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.beginPath();
            pts.forEach((p, i) => {
                p.l -= 0.04;
                if(p.l <= 0) pts.splice(i, 1);
                ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
