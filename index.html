<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELFIGO | SUPREME DIESEL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;900&display=swap');

:root { --c: #00f0ff; --bg: #020b14; }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; cursor: none; }

body, html { 
    background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; 
    min-height: 100vh; overflow: hidden; touch-action: none;
}

/* ── CANVAS SPIDER ── */
canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9999; pointer-events: none; /* Biar tetap bisa klik menu */
}

/* ── BACKGROUND ── */
.bg-base { position: fixed; inset: 0; z-index: -5; background: radial-gradient(circle, #001c27 0%, #000 100%); }

.scene {
    position: relative; display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px; perspective: 1500px;
}

/* ── MIRKO DI BELAKANG ── */
.mirko {
    position: absolute; right: calc(50% - 500px); bottom: -50px;
    width: 600px; z-index: 1; pointer-events: none;
    filter: brightness(1.2) contrast(1.1) drop-shadow(0 0 40px rgba(0, 240, 255, 0.5));
    will-change: transform;
}

/* ── CARD BENING ── */
.tilt-wrap { width: 100%; max-width: 950px; z-index: 10; transform-style: preserve-3d; }

.card {
    position: relative; background: rgba(2, 14, 28, 0.2); 
    backdrop-filter: blur(12px) saturate(1.8); -webkit-backdrop-filter: blur(12px) saturate(1.8);
    border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 40px;
    display: grid; grid-template-columns: 380px 1fr; overflow: hidden;
}

.visual { padding: 30px; }
.img-wrap { width: 100%; height: 500px; border-radius: 25px; overflow: hidden; border: 2px solid var(--c); }
.img-wrap img { width: 100%; height: 100%; object-fit: cover; }

.info { padding: 50px; display: flex; flex-direction: column; justify-content: center; }
h1 {
    font-family: 'Orbitron'; font-size: clamp(3rem, 6vw, 5.5rem); line-height: 0.9; margin-bottom: 20px;
    background: linear-gradient(#fff, var(--c)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.bio { background: rgba(0, 240, 255, 0.1); padding: 20px; border-radius: 15px; border-left: 5px solid var(--c); margin-bottom: 25px; }
.bio p { font-size: 14px; color: #fff; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
.stat { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--c); }
.stat-v { font-family: 'Orbitron'; color: var(--c); font-size: 1.2rem; }

.links { display: flex; flex-direction: column; gap: 12px; }
.btn {
    padding: 18px; border-radius: 12px; text-decoration: none; color: #fff;
    font-family: 'Orbitron'; font-size: 11px; text-align: center;
    background: rgba(0, 240, 255, 0.15); border: 1px solid var(--c); transition: 0.3s;
}
.btn:hover { background: var(--c); color: #000; box-shadow: 0 0 20px var(--c); }

@media (max-width: 880px) {
    .card { grid-template-columns: 1fr; border-radius: 25px; }
    .mirko { width: 350px; right: -20px; bottom: 0; opacity: 0.5; }
    .visual { display: none; }
    *, *::before, *::after { cursor: auto; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="bg-base"></div>

<div class="scene">
    <img src="mirkok.png" class="mirko" id="mirko">

    <div class="tilt-wrap" id="tiltWrap">
        <div class="card">
            <div class="visual">
                <div class="img-wrap"><img src="innova.png"></div>
            </div>
            <div class="info">
                <p style="font-family:'Orbitron'; font-size:10px; color:var(--c); margin-bottom:10px;">ELITE REGISTRY // 083</p>
                <h1>ELFIGO</h1>
                <div class="bio">
                    <p>Membangun <b>2KD-FTV Diesel</b> dengan konsep <em>Pure Stance</em>. Menembus batas performa dan estetika.</p>
                </div>
                <div class="stats">
                    <div class="stat"><div class="stat-v">2KD</div></div>
                    <div class="stat"><div class="stat-v">FTV</div></div>
                    <div class="stat"><div class="stat-v">083</div></div>
                </div>
                <div class="links">
                    <a href="https://wa.me/6283857796343" class="btn" target="_blank">CHAT WHATSAPP</a>
                    <a href="https://discord.gg/cemxjsmRH" class="btn" target="_blank">JOIN DISCORD</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/* ── SPIDER CURSOR ENGINE ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let points = [];
let mouse = { x: null, y: null };

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchstart', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Point {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
            this.x += dx * 0.02;
            this.y += dy * 0.02;
        }
    }
}

for (let i = 0; i < 60; i++) points.push(new Point(Math.random()*canvas.width, Math.random()*canvas.height));

function animateSpider() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    points.forEach(p => {
        p.update();
        points.forEach(p2 => {
            let dx = p.x - p2.x;
            let dy = p.y - p2.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0, 240, 255, ${1 - dist/100})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        });
        
        let dx = p.x - mouse.x;
        let dy = p.y - mouse.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(0, 240, 255, ${1 - dist/150})`;
            ctx.lineWidth = 1.5;
            ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
        }
    });
    requestAnimationFrame(animateSpider);
}
animateSpider();

/* ── PARALLAX ── */
const tiltWrap = document.getElementById('tiltWrap');
const mirko = document.getElementById('mirko');
let tmkX = 0, tmkY = 0, mkX = 0, mkY = 0;

document.addEventListener('mousemove', e => {
    const nx = (e.clientX / window.innerWidth - 0.5) * 2;
    const ny = (e.clientY / window.innerHeight - 0.5) * 2;
    tiltWrap.style.transform = `rotateX(${-ny * 8}deg) rotateY(${nx * 8}deg)`;
    tmkX = nx * 50; tmkY = ny * 25;
});

(function loop() {
    mkX += (tmkX - mkX) * 0.05; mkY += (tmkY - mkY) * 0.05;
    mirko.style.transform = `translateX(${mkX}px) translateY(${mkY + Math.sin(Date.now()*0.002)*15}px)`;
    requestAnimationFrame(loop);
})();
</script>
</body>
</html>
