<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELFIGO | SUPREME DIESEL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;900&display=swap');

:root { --c: #00f0ff; --bg: #020b14; }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; cursor: none; }

body, html { 
    background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; 
    min-height: 100vh; overflow: hidden; touch-action: none;
}

canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; pointer-events: none;
}

.bg-base { position: fixed; inset: 0; z-index: -5; background: radial-gradient(circle, #001c27 0%, #000 100%); }

.scene {
    position: relative; display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px; perspective: 1000px;
}

.mirko {
    position: absolute; 
    right: -5%; 
    bottom: -10px;
    height: 92vh; 
    width: auto; 
    z-index: 1; 
    pointer-events: none;
    filter: brightness(1.2) contrast(1.1) drop-shadow(0 0 40px rgba(0, 240, 255, 0.4));
}

.tilt-wrap { width: 100%; max-width: 950px; z-index: 10; transform-style: preserve-3d; }

.card {
    position: relative; 
    background: rgba(2, 14, 28, 0.08); 
    backdrop-filter: blur(4px) saturate(1.8);
    -webkit-backdrop-filter: blur(4px) saturate(1.8);
    border: 1px solid rgba(0, 240, 255, 0.15); border-radius: 40px;
    display: grid; grid-template-columns: 400px 1fr; overflow: hidden;
}

.visual { padding: 30px; }
.img-wrap { width: 100%; height: 500px; border-radius: 25px; overflow: hidden; border: 1px solid var(--c); }
.img-wrap img { width: 100%; height: 100%; object-fit: cover; }

.info { padding: 50px; display: flex; flex-direction: column; justify-content: center; }

h1 {
    font-family: 'Orbitron'; font-size: clamp(3rem, 6vw, 6rem); line-height: 1; margin-bottom: 20px;
    background: linear-gradient(#fff, var(--c)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.bio { background: rgba(0, 240, 255, 0.05); padding: 20px; border-radius: 15px; border-left: 5px solid var(--c); margin-bottom: 25px; }
.bio p { font-size: 14px; color: #fff; line-height: 1.6; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 35px; }
.stat { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--c); }
.stat-v { font-family: 'Orbitron'; color: var(--c); font-size: 1.3rem; }

.links { display: flex; flex-direction: column; gap: 12px; }
.btn {
    padding: 18px; border-radius: 12px; text-decoration: none; color: #fff;
    font-family: 'Orbitron'; font-size: 11px; text-align: center;
    background: rgba(0, 240, 255, 0.1); border: 1px solid var(--c); transition: 0.3s;
}

@media (max-width: 880px) {
    .card { grid-template-columns: 1fr; border-radius: 30px; }
    .img-wrap { height: 240px; }
    .info { padding: 30px; text-align: center; }
    .mirko { height: 75vh; right: -15%; } 
    *, *::before, *::after { cursor: auto; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="bg-base"></div>

<div class="scene">
    <img src="mirkok.png" class="mirko" id="mirko">

    <div class="tilt-wrap" id="tiltWrap">
        <div class="card">
            <div class="visual">
                <div class="img-wrap"><img src="innova.png"></div>
            </div>
            <div class="info">
                <p style="font-family:'Orbitron'; font-size:10px; color:var(--c); margin-bottom:10px; letter-spacing:4px;">CDID PRIDE REGISTRY</p>
                <h1>ELFIGO</h1>
                <div class="bio">
                    <p>Membangun <b>2KD-FTV Diesel</b> dengan dedikasi penuh. Konsep <em>pure stance & fitment</em> untuk skena CDID Pontianak.</p>
                </div>
                <div class="stats">
                    <div class="stat"><div class="stat-v">2KD</div></div>
                    <div class="stat"><div class="stat-v">FTV</div></div>
                    <div class="stat"><div class="stat-v">083</div></div>
                </div>
                <div class="links">
                    <a href="https://wa.me/6283857796343" class="btn" target="_blank">💬 CHAT WHATSAPP</a>
                    <a href="https://discord.gg/cemxjsmRH" class="btn" target="_blank">🎮 JOIN DISCORD</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouse = { x: null, y: null, radius: 150 };

window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.size = 2;
    }
    update() {
        if (this.x > canvas.width || this.x < 0) this.vx = -this.vx;
        if (this.y > canvas.height || this.y < 0) this.vy = -this.vy;
        this.x += this.vx; this.y += this.vy;

        if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < mouse.radius) {
                this.x -= dx * 0.03;
                this.y -= dy * 0.03;
            }
        }
    }
    draw() {
        ctx.fillStyle = '#00f0ff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    particles = [];
    let count = (canvas.width * canvas.height) / 9000;
    for (let i = 0; i < count; i++) particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < 100) {
                ctx.strokeStyle = `rgba(0, 240, 255, ${1 - distance/100})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animate);
}

init();
animate();

const mirko = document.getElementById('mirko');
let t = 0;
function mirkoAnim() {
    t += 0.02;
    mirko.style.transform = `translateY(${Math.sin(t) * 15}px)`;
    requestAnimationFrame(mirkoAnim);
}
mirkoAnim();

document.addEventListener('mousemove', e => {
    const nx = (e.clientX / window.innerWidth - 0.5) * 2;
    const ny = (e.clientY / window.innerHeight - 0.5) * 2;
    document.getElementById('tiltWrap').style.transform = `rotateX(${-ny * 8}deg) rotateY(${nx * 8}deg)`;
});
</script>
</body>
</html>
